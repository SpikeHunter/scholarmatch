<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarMatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
    <div class="max-w-4xl mx-auto py-8">
        <h1 class="text-3xl font-bold mb-4 text-center">🎓 ScholarMatch</h1>

        <div class="bg-white p-6 rounded-lg shadow">
            <h3 class="text-xl mb-3 font-semibold">Find your scholarship</h3>

            <!-- Search inputs -->
            <div class="grid grid-cols-1 md:grid-cols-6 gap-4 mb-4">
                <select id="country" class="border p-2 rounded bg-white">
                    <option value="">All Countries</option>
                    <option value="USA">USA</option>
                    <option value="UK">UK</option>
                    <option value="Germany">Germany</option>
                    <option value="Japan">Japan</option>
                    <option value="South Korea">South Korea</option>
                    <option value="China">China</option>
                    <option value="Turkey">Turkey</option>
                    <option value="Australia">Australia</option>
                    <option value="Canada">Canada</option>
                    <option value="Netherlands">Netherlands</option>
                    <option value="Switzerland">Switzerland</option>
                    <option value="Finland">Finland</option>
                    <option value="New Zealand">New Zealand</option>
                    <option value="Uzbekistan">Uzbekistan</option>
                    <option value="Europe">Europe</option>
                    <option value="Various">Various</option>
                </select>
                <select id="field" class="border p-2 rounded bg-white">
                    <option value="">All Fields</option>
                    <option value="Any">Any</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Engineering">Engineering</option>
                    <option value="Information Technology">Information Technology</option>
                    <option value="Finance">Finance</option>
                    <option value="Research">Research</option>
                    <option value="Social Sciences">Social Sciences</option>
                    <option value="Public Policy">Public Policy</option>
                    <option value="Science">Science</option>
                    <option value="Development">Development</option>
                    <option value="Leadership">Leadership</option>
                    <option value="National Security">National Security</option>
                </select>
                <select id="degreeLevel" class="border p-2 rounded bg-white">
                    <option value="All Levels">All Levels</option>
                    <option value="Bachelor">Bachelor</option>
                    <option value="Master">Master</option>
                    <option value="PhD">PhD</option>
                </select>
                <select id="fundingType" class="border p-2 rounded bg-white">
                    <option value="All Types">All Types</option>
                    <option value="Full">Full</option>
                    <option value="Partial">Partial</option>
                    <option value="Tuition only">Tuition only</option>
                </select>
                <select id="englishLevel" class="border p-2 rounded bg-white">
                    <option value="Any">Any</option>
                    <option value="IELTS 6.0+">IELTS 6.0+</option>
                    <option value="IELTS 6.5+">IELTS 6.5+</option>
                    <option value="IELTS 7.0+">IELTS 7.0+</option>
                    <option value="TOEFL 80+">TOEFL 80+</option>
                    <option value="TOEFL 90+">TOEFL 90+</option>
                    <option value="No requirement">No requirement</option>
                </select>
                <input id="gpa" type="number" step="0.01" placeholder="Enter GPA" class="border p-2 rounded">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <select id="sortBy" class="border p-2 rounded bg-white">
                    <option value="name">Sort by Name</option>
                    <option value="country">Sort by Country</option>
                    <option value="min_gpa">Sort by Min GPA</option>
                </select>
            </div>

            <div class="flex flex-wrap gap-2 mb-4">
                <button id="searchBtn" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">Search</button>
                <button id="favoritesTab" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">My Favorites</button>
            </div>

            <!-- Results -->
            <div id="results" class="mt-6"></div>
            <div id="pagination" class="mt-4 flex justify-center gap-2"></div>
        </div>
    </div>

    <!-- Correct script path -->
    <script src="/static/script.js"></script>
</body>
</html>
